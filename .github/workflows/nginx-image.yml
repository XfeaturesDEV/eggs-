name: Build & publish Nginx egg image

on:
  push:
    branches: [main]
    paths:
      - "nginx/Dockerfile"
      - "nginx/entrypoint.sh"
      - ".github/workflows/nginx-image.yml"
  workflow_dispatch: {}

env:
  IMAGE_NAME: ghcr.io/xfeaturesdev/nginx-pterodactyl

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
